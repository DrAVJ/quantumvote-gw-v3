<!DOCTYPE html>
<!--
  FILE: src/html/results.html
  PROJECT: QuantumVote GW v3
  OWNER: Agent 3 (Frontend & HTML)
  PURPOSE: Results View - Displays vote distributions for R1 and R2.
  CONTRACT: API_CONTRACT_v1.md
-->
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultat - QuantumVote GW v3</title>
  <style>
    body { font-family: sans-serif; margin: 20px; background: #fff; color: #333; text-align: center; }
    .results-container { max-width: 900px; margin: auto; }
    .charts { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 30px; }
    .chart-box { width: 45%; min-width: 300px; margin-bottom: 30px; }
    .bar-container { display: flex; align-items: flex-end; height: 200px; border-bottom: 2px solid #333; padding-bottom: 10px; gap: 10px; }
    .bar { flex: 1; background: #007bff; position: relative; border-radius: 4px 4px 0 0; min-height: 5px; }
    .bar-label { margin-top: 10px; font-weight: bold; }
    .bar-value { position: absolute; top: -25px; width: 100%; text-align: center; font-size: 0.8rem; }
    .correct { background: #28a745 !important; }
    h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .stats-info { margin-top: 20px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="results-container">
    <h1 id="questionTitle">Resultat</h1>
    <div id="statsSummary" class="stats-info">Laddar resultat...</div>

    <div class="charts">
      <div class="chart-box">
        <h2>Omgång 1</h2>
        <div id="chartR1" class="bar-container">
          <!-- Bars generated by JS -->
        </div>
      </div>
      <div class="chart-box">
        <h2>Omgång 2</h2>
        <div id="chartR2" class="bar-container">
          <!-- Bars generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script>
    let sessionId = new URLSearchParams(window.location.search).get('sessionId');

    function init() {
      if(!sessionId) return;
      startPolling();
    }

    function startPolling() {
      setInterval(fetchResults, 3000);
      fetchResults();
    }

    function fetchResults() {
      google.script.run
        .withSuccessHandler(res => {
          if(res.ok) {
            renderResults(res.stats);
          }
        })
        .Analytics_computeQuestionStats(sessionId, ""); // questionId assumed handled by backend session context
    }

    function renderResults(stats) {
      document.getElementById('statsSummary').innerText = "R1: " + stats.nR1 + " röster | R2: " + stats.nR2 + " röster | Gain: " + (stats.gain * 100).toFixed(1) + "%";
      
      renderChart('chartR1', stats.distR1);
      renderChart('chartR2', stats.distR2);
    }

    function renderChart(containerId, distribution) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      
      const options = ['A', 'B', 'C', 'D'];
      const maxVal = Math.max(...Object.values(distribution), 1);

      options.forEach(opt => {
        const val = distribution[opt] || 0;
        const pct = (val / maxVal) * 100;
        
        const barWrap = document.createElement('div');
        barWrap.style.flex = "1";
        barWrap.style.display = "flex";
        barWrap.style.flexDirection = "column";
        barWrap.style.alignItems = "center";
        barWrap.style.height = "100%";
        barWrap.style.justifyContent = "flex-end";

        const bar = document.createElement('div');
        bar.className = "bar";
        bar.style.height = pct + "%";
        bar.style.width = "80%";
        
        const valLabel = document.createElement('div');
        valLabel.className = "bar-value";
        valLabel.innerText = val;
        bar.appendChild(valLabel);

        const label = document.createElement('div');
        label.className = "bar-label";
        label.innerText = opt;

        barWrap.appendChild(bar);
        barWrap.appendChild(label);
        container.appendChild(barWrap);
      });
    }

    window.onload = init;
  </script>
</body>
</html>
